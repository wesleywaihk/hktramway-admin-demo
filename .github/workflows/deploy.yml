name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          find admin -name "*.html" | xargs sed -i \
            -e 's|/_next/|/hktramway-admin-demo/_next/|g' \
            -e 's|"/favicon\.ico|"/hktramway-admin-demo/favicon.ico|g'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: admin

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
